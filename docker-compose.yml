version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recruitment-intelligence-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:17
    container_name: recruitment-intelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recruitment_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recruitment_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recruitment-intelligence-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
